name: Scribe
options:
  bundleIdPrefix: com.localdictate
  deploymentTarget:
    macOS: "13.0"
packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: 0.9.0
targets:
  Scribe:
    type: application
    platform: macOS
    sources:
      - path: Scribe
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
    settings:
      base:
        PRODUCT_NAME: Scribe
        PRODUCT_BUNDLE_IDENTIFIER: com.localdictate.app
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "2LCM5MU5MF"
        CODE_SIGN_ENTITLEMENTS: Scribe/Scribe.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Scribe
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Scribe necesita acceso al micrófono para grabar tu voz y transcribirla localmente en esta Mac."
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - ScribeTests
  ScribeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ScribeTests
    dependencies:
      - target: Scribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localdictate.app.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "2LCM5MU5MF"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
